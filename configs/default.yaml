dataset:
  signal_library_mat: HCP-IMSC-main/数据处理部分/singal_test.mat
  num_samples: 2000
  sensor_ids: [73, 28, 23, 78]
  scene_side_length: 80.0
  heights: [25, 40, 20, 80, 100, 120, 140]
  height_index: 2
  snr_values: [10, 9, 7, 8, 9, 10]
  snr_index: 0
  min_sources: 4
  max_sources: 8
  location_range: [1, 100]
  power_range: [50, 100]
  nmf_rank: 8
  nmf_iters: 200
  detection_anchor_sensor: 34
  detection_anchor_source: 100
  seed: 15

splits:
  train_ratio: 0.7
  val_ratio: 0.15

model:
  hidden_channels: 32
  use_valid_mask_feature: true

training:
  epochs: 300
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  use_cuda: true
  lambda_corr: 0.0
  lambda_consistency: 0.0
